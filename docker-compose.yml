services:
  postgres:
    image: postgres:16
    container_name: postgres-container

    environment:
      POSTGRES_DB: ems
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Hanuman123

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    image: jiteshvijaynarode/jitesh-repo:ems-backend-resapi
    container_name: ems-backend-container

    ports:
      - "8091:8080"

    environment:
      DB_URL: jdbc:postgresql://postgres:5432/ems
      DB_USERNAME: postgres
      DB_PASSWORD: Hanuman123

    depends_on:
      - postgres

  frontend:
    image: jiteshvijaynarode/jitesh-repo:ems-frotend-v1
    container_name: ems-frontend-container

    ports:
      - "3001:3000"

    depends_on:
      - backend

volumes:
  postgres-data:
